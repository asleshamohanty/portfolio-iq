services:
  db:
    image: pgvector/pgvector:pg16
    container_name: portfolioiq_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: portfolioiq
      POSTGRES_PASSWORD: portfolioiq_dev_password
      POSTGRES_DB: portfolioiq
    ports:
      - "5432:5432"
    volumes:
      - portfolioiq_pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolioiq"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: portfolioiq_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: portfolioiq
      POSTGRES_PASSWORD: portfolioiq_dev_password
      POSTGRES_DB: portfolioiq
      FRED_API_KEY: ${FRED_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - .:/code

volumes:
  portfolioiq_pgdata: